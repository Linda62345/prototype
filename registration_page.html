<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動報名資訊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg-page: #f4f5f7;
  --bg-card: #ffffff;
  --bg-secondary: #f8f9fa;
  --border: rgba(0,0,0,0.10);
  --border-md: rgba(0,0,0,0.16);
  --text-primary: #1a1a2e;
  --text-secondary: #5a6270;
  --text-tertiary: #9aa3ae;
  --accent: #185FA5;
  --radius-md: 8px;
  --radius-lg: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  font-size: 14px;
  padding: 24px 20px 60px;
  min-height: 100vh;
}
.container { max-width: 860px; margin: 0 auto; }

.breadcrumb {
  font-size: 12px; color: var(--text-tertiary);
  margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
}
.breadcrumb i { font-size: 13px; }
.breadcrumb a { color: var(--text-secondary); text-decoration: none; }
.breadcrumb a:hover { color: var(--accent); }

.card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }

.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 0.5px solid var(--border); gap: 12px; flex-wrap: wrap;
}
.toolbar-left { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
.toolbar-left i { font-size: 16px; color: var(--accent); }
.toolbar-right { display: flex; align-items: center; gap: 8px; }

.search-box {
  display: flex; align-items: center; gap: 7px;
  border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
  padding: 7px 12px; background: var(--bg-card); min-width: 220px;
}
.search-box i { font-size: 15px; color: var(--text-tertiary); flex-shrink: 0; }
.search-box input {
  border: none; outline: none; font-size: 13px; color: var(--text-primary);
  background: transparent; font-family: 'Noto Sans TC', sans-serif; width: 100%;
}
.search-box input::placeholder { color: var(--text-tertiary); }

.btn-green {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; padding: 7px 14px;
  border-radius: var(--radius-md); cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  color: #fff; border: none; background: #0F6E56; white-space: nowrap;
  transition: background .12s;
}
.btn-green:hover { background: #085041; }
.btn-green i { font-size: 15px; }

.stats-row { background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); padding: 14px 20px; }
.stat-val { font-size: 22px; font-weight: 500; color: var(--text-primary); }
.stat-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead tr { background: var(--bg-secondary); }
th {
  font-size: 12px; font-weight: 500; color: var(--text-secondary);
  text-align: left; padding: 10px 18px;
  border-bottom: 0.5px solid var(--border); white-space: nowrap;
}
td {
  font-size: 13px; color: var(--text-primary);
  padding: 11px 18px; border-bottom: 0.5px solid var(--border); vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg-secondary); }

th:nth-child(1), td:nth-child(1) { width: 90px; }
th:nth-child(2), td:nth-child(2) { width: auto; }
th:nth-child(3), td:nth-child(3) { width: 120px; }

.empty-state {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px; color: var(--text-tertiary); gap: 8px;
}
.empty-state i { font-size: 36px; }
.empty-state span { font-size: 13px; }

.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; border-top: 0.5px solid var(--border);
}
.page-info { font-size: 12px; color: var(--text-tertiary); }
.page-btns { display: flex; gap: 4px; }
.page-btn {
  width: 30px; height: 30px; border-radius: var(--radius-md);
  border: 0.5px solid var(--border-md); background: var(--bg-card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text-secondary);
  font-family: 'Noto Sans TC', sans-serif; transition: all .1s;
}
.page-btn:hover { background: var(--bg-secondary); }
.page-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">

  <div class="breadcrumb">
    <i class="ti ti-layout-dashboard"></i>
    <a href="#">管理員頁面</a>
    <i class="ti ti-chevron-right"></i>
    <span>查看活動報名頁面</span>
  </div>

  <div class="card">

    <div class="toolbar">
      <div class="toolbar-left">
        <i class="ti ti-clipboard-list"></i>
        2025 夏季音樂節 — 報名名單
      </div>
      <div class="toolbar-right">
        <div class="search-box">
          <i class="ti ti-search"></i>
          <input type="text" id="search-input" placeholder="搜尋姓名、信箱…" oninput="applySearch()">
        </div>
        <button class="btn-green" onclick="exportExcel()">
          <i class="ti ti-file-spreadsheet"></i>匯出 Excel
        </button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-lbl">報名總數</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>電子信箱</th>
            <th>報名時間</th>
          </tr>
        </thead>
        <tbody id="reg-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state">
        <i class="ti ti-inbox"></i>
        <span>沒有符合條件的報名資料</span>
      </div>
    </div>

    <div class="pagination">
      <span class="page-info" id="page-info"></span>
      <div class="page-btns" id="page-btns"></div>
    </div>

  </div>
</div>

<script>
var ALL_DATA = [
  { name:"王小明", email:"wang@example.com",  date:"2025/06/01" },
  { name:"陳美玲", email:"chen@example.com",  date:"2025/06/02" },
  { name:"李建國", email:"li@example.com",    date:"2025/06/03" },
  { name:"張雅婷", email:"chang@example.com", date:"2025/06/04" },
  { name:"林志偉", email:"lin@example.com",   date:"2025/06/05" },
  { name:"黃淑芬", email:"huang@example.com", date:"2025/06/06" },
  { name:"吳俊廷", email:"wu@example.com",    date:"2025/06/07" },
  { name:"蔡雨晴", email:"tsai@example.com",  date:"2025/06/08" },
  { name:"鄭博文", email:"cheng@example.com", date:"2025/06/09" },
  { name:"許雅文", email:"hsu@example.com",   date:"2025/06/10" },
  { name:"楊明輝", email:"yang@example.com",  date:"2025/06/11" },
  { name:"謝佳蓉", email:"hsieh@example.com", date:"2025/06/12" },
  { name:"曾彥廷", email:"tseng@example.com", date:"2025/06/13" },
  { name:"賴怡君", email:"lai@example.com",   date:"2025/06/14" },
  { name:"洪瑞祥", email:"hung@example.com",  date:"2025/06/15" },
];

var filtered = ALL_DATA.slice();
var currentPage = 1;
var PAGE_SIZE = 10;

function applySearch() {
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  filtered = q
    ? ALL_DATA.filter(function(r){ return r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q); })
    : ALL_DATA.slice();
  currentPage = 1;
  render();
}

function render() {
  var tbody = document.getElementById('reg-tbody');
  var empty = document.getElementById('empty-state');
  tbody.innerHTML = '';

  document.getElementById('stat-total').textContent = ALL_DATA.length;

  if (filtered.length === 0) {
    empty.style.display = 'flex';
    document.getElementById('page-info').textContent = '';
    document.getElementById('page-btns').innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  var start = (currentPage - 1) * PAGE_SIZE;
  var pageData = filtered.slice(start, start + PAGE_SIZE);

  pageData.forEach(function(r) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + r.name + '</td>' +
      '<td style="color:var(--accent);">' + r.email + '</td>' +
      '<td>' + r.date + '</td>';
    tbody.appendChild(tr);
  });

  document.getElementById('page-info').textContent =
    '第 ' + (start+1) + '–' + Math.min(start+PAGE_SIZE, filtered.length) + ' 筆，共 ' + filtered.length + ' 筆';

  var btnWrap = document.getElementById('page-btns');
  btnWrap.innerHTML = '';

  var prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.innerHTML = '<i class="ti ti-chevron-left" style="font-size:14px;"></i>';
  prev.disabled = currentPage === 1;
  prev.onclick = function(){ if(currentPage>1){currentPage--;render();} };
  btnWrap.appendChild(prev);

  for (var i = 1; i <= totalPages; i++) {
    (function(p){
      var b = document.createElement('button');
      b.className = 'page-btn' + (p===currentPage ? ' on' : '');
      b.textContent = p;
      b.onclick = function(){ currentPage = p; render(); };
      btnWrap.appendChild(b);
    })(i);
  }

  var next = document.createElement('button');
  next.className = 'page-btn';
  next.innerHTML = '<i class="ti ti-chevron-right" style="font-size:14px;"></i>';
  next.disabled = currentPage === totalPages;
  next.onclick = function(){ if(currentPage<totalPages){currentPage++;render();} };
  btnWrap.appendChild(next);
}

function exportExcel() {
  var ws = XLSX.utils.aoa_to_sheet(
    [['姓名','電子信箱','報名時間']].concat(
      ALL_DATA.map(function(r){ return [r.name, r.email, r.date]; })
    )
  );
  ws['!cols'] = [{wch:12},{wch:28},{wch:14}];
  var hStyle = {
    font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:11},
    fill:{patternType:'solid',fgColor:{rgb:'185FA5'}},
    alignment:{horizontal:'center'}
  };
  ['A1','B1','C1'].forEach(function(a){ if(ws[a]) ws[a].s = hStyle; });
  ALL_DATA.forEach(function(r, ri){
    var bg = ri%2===0 ? 'FFFFFF' : 'F8F9FA';
    ['A','B','C'].forEach(function(col){
      var a = col+(ri+2);
      if(ws[a]) ws[a].s = { font:{color:{rgb:'1A1A2E'},name:'Arial',sz:10}, fill:{patternType:'solid',fgColor:{rgb:bg}}, alignment:{horizontal:'left'} };
    });
  });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '報名名單');
  var d = new Date();
  var ts = d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2);
  XLSX.writeFile(wb, '報名名單_' + ts + '.xlsx');
}

render();
</script>
</body>
</html>
